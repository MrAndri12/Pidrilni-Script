<svg xmlns="http://w3.org" viewBox="0 0 800 300" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0d12"/>
      <stop offset="100%" stop-color="#11141a"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Фон -->
  <rect width="800" height="300" fill="url(#bg)"/>
  
  <!-- Декоративная сетка на фоне -->
  <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250" stroke="#161b24" stroke-width="1"/>
  <path d="M 100,0 L 100,300 M 200,0 L 200,300 M 300,0 L 300,300 M 400,0 L 400,300 M 500,0 L 500,300 M 600,0 L 600,300 M 700,0 L 700,300" stroke="#161b24" stroke-width="1"/>
  
  <!-- Mac Controls в углу -->
  <circle cx="40" cy="40" r="7" fill="#ff5f57"/>
  <circle cx="65" cy="40" r="7" fill="#ffbd2e"/>
  <circle cx="90" cy="40" r="7" fill="#27c93f"/>
  
  <!-- Главный Текст -->
  <text x="400" y="140" font-family="'Segoe UI', Roboto, sans-serif" font-size="52" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="-1">
    PIDRILNI <tspan fill="#32e1b4" filter="url(#glow)">SCRIPT</tspan>
  </text>
  
  <!-- Сабтитры -->
  <text x="400" y="195" font-family="'Segoe UI', Roboto, sans-serif" font-size="20" font-weight="600" fill="#8fa0af" text-anchor="middle" letter-spacing="4">
    MURDER MYSTERY 2  |  v7.0
  </text>
  
  <!-- Автор -->
  <text x="400" y="240" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="700" fill="#32e1b4" text-anchor="middle" opacity="0.8">
    by mrandrioff
  </text>
  
  <!-- Неоновые линии по бокам -->
  <line x1="250" y1="215" x2="550" y2="215" stroke="#32e1b4" stroke-width="2" opacity="0.3" filter="url(#glow)"/>
</svg>
